<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projects</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="projects">
  <div id="top-nav"></div>
  <h1>Projects</h1>
  <div id="loading"></div>
  <div id="error" class="error"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Owner</th>
        <th>Tasks</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="projects-body"></tbody>
  </table>

  <fieldset>
    <legend>Create Project</legend>
    <form id="create-project-form">
      <p>
        <label for="create-project-name">Name</label><br />
        <input type="text" id="create-project-name" required />
      </p>
      <p>
        <label for="create-project-description">Description</label><br />
        <input type="text" id="create-project-description" />
      </p>
      <p>
        <label for="create-project-owner">Owner ID</label><br />
        <input type="text" id="create-project-owner" required />
      </p>
      <p>
        <button type="submit">Create</button>
      </p>
    </form>
  </fieldset>

  <fieldset>
    <legend>Add Member to Project</legend>
    <form id="add-member-form">
      <p>
        <label for="add-member-project">Project ID</label><br />
        <input type="text" id="add-member-project" required />
      </p>
      <p>
        <label for="add-member-user">User ID</label><br />
        <input type="text" id="add-member-user" required />
      </p>
      <p>
        <button type="submit">Add</button>
      </p>
    </form>
  </fieldset>

  <hr />

  <script src="app.js"></script>
</body>
</html>
