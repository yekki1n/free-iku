<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Users</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="users">
  <div id="top-nav"></div>
  <h1>Users</h1>
  <div id="loading"></div>
  <div id="error" class="error"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="users-body"></tbody>
  </table>

  <fieldset>
    <legend>Create User</legend>
    <form id="create-user-form">
      <p>
        <label for="create-user-fullname">Full Name</label><br />
        <input type="text" id="create-user-fullname" required />
      </p>
      <p>
        <label for="create-user-email">Email</label><br />
        <input type="email" id="create-user-email" required />
      </p>
      <p>
        <label for="create-user-password">Password</label><br />
        <input type="password" id="create-user-password" required />
      </p>
      <p>
        <label for="create-user-role">Role</label><br />
        <select id="create-user-role">
          <option value="USER">USER</option>
          <option value="MANAGER">MANAGER</option>
        </select>
      </p>
      <p>
        <button type="submit">Create</button>
      </p>
    </form>
  </fieldset>

  <hr />

  <script src="app.js"></script>
</body>
</html>
